spring:
  application:
    name: liliblog
  profiles:
    active: dev
  datasource:
    driver-class-name: ${liliblog.datasource.driver-class-name}
    url: ${liliblog.datasource.url}
    username: ${liliblog.datasource.username}
    password: ${liliblog.datasource.password}
    hikari:
      minimum-idle: ${liliblog.datasource.hikari.minimum-idle}  # 启动时就创建5个空闲连接
      connection-test-query: ${liliblog.datasource.hikari.connection-test-query}
      initialization-fail-timeout: ${liliblog.datasource.hikari.initialization-fail-timeout}
  data:
    redis:
      host: ${liliblog.data.redis.host}
      password: ${liliblog.data.redis.password}
      port: ${liliblog.data.redis.port}
      database: ${liliblog.data.redis.database}
      timeout: ${liliblog.data.redis.timeout}
      lettuce:
        pool:
          max-active: ${liliblog.data.redis.lettuce.pool.max-active}
          max-idle: ${liliblog.data.redis.lettuce.pool.max-idle}
          min-idle: ${liliblog.data.redis.lettuce.pool.min-idle}
          max-wait: ${liliblog.data.redis.lettuce.pool.max-wait}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除字段
      logic-not-delete-value: 0   # 0表示未删除
      logic-delete-value: 1       # 1表示已删除

springdoc:
  api-docs:
    path: /v3/api-docs    # 自定义JSON文档路径
  swagger-ui:
    path: /swagger-ui.html # 自定义UI路径
    enabled: true

knife4j:
  enable: true
  production: false # 生产环境禁用
  setting:
    language: zh-CN

http-only-cookies:
  ssl: ${liliblog.http-only-cookies.ssl} # https验证，生产环境需设为true

jwt:
  # 密钥（secret）必须是经过Base64编码的32字节（或更长）的字符串
  secret: ${liliblog.jwt.secret}
  expiration: ${liliblog.jwt.expiration} # 访问令牌有效期，单位毫秒
  refresh-expiration: ${liliblog.jwt.refresh-expiration} # 刷新令牌有效期，单位毫秒

oss:
  access-key: ${liliblog.oss.access-key}
  secret-key: ${liliblog.oss.secret-key}
  bucket: ${liliblog.oss.bucket}