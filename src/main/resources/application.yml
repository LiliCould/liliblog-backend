spring:
  application:
    name: liliblog
  profiles:
    active: dev

liliblog:
  http-only-cookies:
    ssl: false # 设置为false关闭https验证，生产环境需设为true
  jwt:
    # 密钥（secret）必须是经过Base64编码的32字节（或更长）的字符串
    secret: "d29zaGlsaWxpa2Vhc2RhaG5ramRoYWtqc2ZoamFrc2ZobGFrc2hmbGthc2hmbGFqc2ZrbGFoZnNhc2Zhc2Zhc2Y="
    expiration: 3600000 # 访问令牌有效期，单位毫秒，这里设为了1小时
    refresh-expiration: 604800000 # 刷新令牌有效期，单位毫秒，这里设为了7天