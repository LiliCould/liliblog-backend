<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth2 登录测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .btn-github {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: #24292e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-github:hover {
            background: #1b1f23;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 41, 46, 0.4);
        }

        .btn-github:active {
            transform: translateY(0);
        }

        .btn-github svg {
            width: 24px;
            height: 24px;
        }

        .status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .status-content {
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
        }

        .token-info {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }

        .user-info {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            font-size: 13px;
        }

        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 15px;
            vertical-align: middle;
        }

        .user-info .info-text {
            display: inline-block;
            vertical-align: middle;
        }

        .user-info .nickname {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .user-info .username {
            color: #666;
            font-size: 14px;
        }

        .clear-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .clear-btn:hover {
            background: #5a6268;
        }

        .current-token {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .current-token.show {
            display: block;
        }

        .current-token strong {
            display: block;
            margin-bottom: 8px;
            color: #495057;
        }

        .current-token code {
            display: block;
            word-break: break-all;
            color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub OAuth2 登录测试</h1>
        <p class="subtitle">点击下方按钮跳转到 GitHub 授权页面</p>

        <button class="btn-github" onclick="startOAuthLogin()">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub 登录
        </button>

        <div id="status" class="status"></div>

        <div id="currentToken" class="current-token">
            <strong>当前存储的 Token:</strong>
            <code id="tokenDisplay"></code>
        </div>

        <button id="clearBtn" class="clear-btn" onclick="clearToken()" style="display: none;">清除 Token</button>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        let popupWindow = null;
        let checkInterval = null;

        function startOAuthLogin() {
            const oauthUrl = `${API_BASE_URL}/oauth2/authorization/github`;

            const width = 600;
            const height = 700;
            const left = (window.screen.width - width) / 2;
            const top = (window.screen.height - height) / 2;

            popupWindow = window.open(
                oauthUrl,
                'GitHub OAuth',
                `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,location=yes,status=no`
            );

            if (!popupWindow) {
                alert('弹出窗口被阻止，请允许弹出窗口后重试');
                return;
            }

            checkInterval = setInterval(() => {
                if (popupWindow.closed) {
                    clearInterval(checkInterval);
                    checkPopupResult();
                }
            }, 500);
        }

        async function checkPopupResult() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login/github`, {
                    method: 'GET',
                    credentials: 'include'
                });

                const result = await response.json();
                showResult(result);
            } catch (error) {
                showResult({
                    code: -1,
                    msg: '检查登录状态失败: ' + error.message
                });
            }
        }

        function showResult(result) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status show';

            if (result.code === 0) {
                statusDiv.classList.add('success');
                const data = result.data;

                if (data && data.accessToken) {
                    localStorage.setItem('github_token', data.accessToken);
                }

                let html = `
                    <div class="status-title">✓ 登录成功</div>
                    <div class="status-content">${result.msg || '登录成功'}</div>
                `;

                if (data) {
                    html += `
                        <div class="token-info">
                            <strong>Token:</strong><br>${data.accessToken || '无'}
                        </div>
                    `;

                    if (data.userInfo) {
                        const user = data.userInfo;
                        html += `
                            <div class="user-info">
                                <img src="${user.avatar || ''}" alt="avatar" onerror="this.style.display='none'">
                                <div class="info-text">
                                    <div class="nickname">${user.nickname || user.username || '未知'}</div>
                                    <div class="username">@${user.username || 'unknown'}</div>
                                    <div>${user.email || ''}</div>
                                </div>
                            </div>
                        `;
                    }
                }

                statusDiv.innerHTML = html;
                document.getElementById('clearBtn').style.display = 'inline-block';
                updateCurrentTokenDisplay();
            } else {
                statusDiv.classList.add('error');
                statusDiv.innerHTML = `
                    <div class="status-title">✗ 登录失败</div>
                    <div class="status-content">${result.msg || '登录失败'} (code: ${result.code})</div>
                `;
            }
        }

        function updateCurrentTokenDisplay() {
            const token = localStorage.getItem('github_token');
            const currentTokenDiv = document.getElementById('currentToken');
            const tokenDisplay = document.getElementById('tokenDisplay');

            if (token) {
                currentTokenDiv.classList.add('show');
                tokenDisplay.textContent = token;
            } else {
                currentTokenDiv.classList.remove('show');
            }
        }

        function clearToken() {
            localStorage.removeItem('github_token');
            document.getElementById('currentToken').classList.remove('show');
            document.getElementById('status').className = 'status';
            document.getElementById('clearBtn').style.display = 'none';
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'github_token') {
                updateCurrentTokenDisplay();
            }
        });

        updateCurrentTokenDisplay();
    </script>
</body>
</html>
